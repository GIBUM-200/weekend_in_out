<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>주말 외출·외박 신청</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      color: #202124;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 2px 10px rgba(60, 64, 67, 0.08);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 6px;
    }

    .desc {
      color: #5f6368;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .notice {
      background: #fef7e0;
      border: 1px solid #fdd663;
      border-radius: 10px;
      padding: 12px;
      margin: 12px 0 18px;
      line-height: 1.5;
      display: none;
    }

    .field {
      margin: 14px 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 7px;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 10px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .checks label {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0;
      padding: 8px;
      border: 1px solid #eee;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #1a73e8;
      color: #fff;
    }

    .secondary {
      background: #e8eaed;
      color: #202124;
    }

    .msg {
      margin-top: 14px;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .ok {
      color: #188038;
    }

    .err {
      color: #d93025;
    }

    .small {
      font-size: 13px;
      color: #5f6368;
      line-height: 1.45;
      margin-top: 4px;
    }

    @media (max-width: 640px) {
      .grid,
      .checks {
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>주말 외출·외박 신청</h1>

    <div class="desc">
      반, 학번, 이름을 정확히 입력한 뒤 잔류·귀가·외출·식사 신청 내용을 제출하세요.
    </div>

    <div id="specialNotice" class="notice"></div>

    <form id="form">
      <div class="grid">
        <div class="field">
          <label for="className">반</label>
          <select id="className" required>
            <option value="">선택</option>
            <option value="1-1">1-1</option>
            <option value="1-2">1-2</option>
            <option value="1-3">1-3</option>
            <option value="1-4">1-4</option>
            <option value="1-5">1-5</option>
          </select>
        </div>

        <div class="field">
          <label for="studentId">학번</label>
          <input id="studentId" type="text" inputmode="numeric" placeholder="예: 1203" required />
        </div>
      </div>

      <div class="field">
        <label for="studentName">이름</label>
        <input id="studentName" type="text" placeholder="이름" required />
      </div>

      <div class="field">
        <label for="commonChoice">공통 선택</label>
        <select id="commonChoice" onchange="toggleFields()" required>
          <option value="__SELECT__">선택</option>
          <option value="">전체귀가</option>
          <option value="O">O (잔류)</option>
          <option value="♣" id="clubOption">♣ (금요일 귀가)</option>
          <option value="△" id="triangleOption">△ (토요일 귀가)</option>
          <option value="통학">통학</option>
        </select>
        <div class="small" id="choiceHelp">
          일반 주말에는 △가 토요일 귀가를 의미합니다.
        </div>
      </div>

      <div id="fridayWrap" class="field hidden">
        <label for="fridayTime" id="clubLeaveLabel">금요일 귀가시간</label>
        <select id="fridayTime">
          <option value="">선택</option>
        </select>
      </div>

      <div id="saturdayWrap" class="field hidden">
        <label for="saturdayTime" id="triangleLeaveLabel">토요일 귀가시간</label>
        <select id="saturdayTime" onchange="handleTriangleLeaveTimeChange()">
          <option value="">선택</option>
        </select>
      </div>

      <div id="returnWrap" class="field hidden">
        <label for="returnTime">복귀시간</label>
        <select id="returnTime" onchange="handleReturnTimeChange()">
          <option value="">선택</option>
        </select>
      </div>

      <div id="mealWrap" class="field hidden">
        <label>외부식당 이용 / 식사 신청</label>
        <div id="mealChecks" class="checks"></div>
        <div class="small" id="mealHelp">
          첫째 날 귀가자는 둘째 날 식사를 신청할 수 없습니다.
        </div>
      </div>

      <div id="satOutingWrap" class="field hidden">
        <label id="firstOutingTitle">토요일 외출</label>
        <div class="grid">
          <div>
            <label id="firstOutingReasonLabel" for="satOutingReason">토요일 외출 사유</label>
            <input id="satOutingReason" type="text" placeholder="예: 병원, 학원, 가족식사 등" />
          </div>

          <div>
            <label id="firstOutingDepartLabel" for="satOutingDepartTime">토요일 외출 출발</label>
            <input id="satOutingDepartTime" type="text" placeholder="예: 13:00" />
          </div>
        </div>

        <div class="field">
          <label id="firstOutingReturnLabel" for="satOutingReturnTime">토요일 외출 복귀</label>
          <input id="satOutingReturnTime" type="text" placeholder="예: 17:30" />
        </div>
      </div>

      <div id="sunOutingWrap" class="field hidden">
        <label id="secondOutingTitle">일요일 외출</label>
        <div class="grid">
          <div>
            <label id="secondOutingReasonLabel" for="sunOutingReason">일요일 외출 사유</label>
            <input id="sunOutingReason" type="text" placeholder="예: 병원, 학원, 가족식사 등" />
          </div>

          <div>
            <label id="secondOutingDepartLabel" for="sunOutingDepartTime">일요일 외출 출발</label>
            <input id="sunOutingDepartTime" type="text" placeholder="예: 13:00" />
          </div>
        </div>

        <div class="field">
          <label id="secondOutingReturnLabel" for="sunOutingReturnTime">일요일 외출 복귀</label>
          <input id="sunOutingReturnTime" type="text" placeholder="예: 17:30" />
        </div>
      </div>

      <div class="buttons">
        <button class="primary" type="submit">제출</button>
        <button class="secondary" type="button" onclick="resetForm()">초기화</button>
      </div>

      <div id="message" class="msg"></div>
    </form>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwd3kgOhq_LwqcY9hqElTsF6i5kVSKix8VGrgULrKmUEM7yA1CzN1Rm_RzPft9AZzfMVg/exec';

    const SPECIAL_PLAN = {
      enabled: true,
      mode: 'oneDay',

      submitFrom: '2026-05-31',
      submitUntil: '2026-06-02',

      operateFrom: '2026-06-03',
      operateUntil: '2026-06-03',

      enforceSubmitWindow: true,

      stayDays: ['(수)'],

      clubLeaveOptions: ['16:40', '18:20', '21:00', '23:20'],

      triangleLeaveOptions: [

      ],

      returnOptions: [
        '(수) 17:30~19:00',
        '(수) 21:00~21:30',
        '(수) 23:00~23:30',
        '목요일 오전'
      ]
    };

    const DEFAULT_WEEKEND = {
      clubLeaveOptions: ['16:40', '18:20', '21:00', '23:20'],
      triangleLeaveOptions: [
        '(토) 9:00 이전',
        '(토) 12:50-2교시 후',
        '(토) 17:30-4교시 후',
        '(토) 21:00',
        '(토) 23:00'
      ],
      returnOptionsForAllHomeOrTriangle: [
        '(일) 17:30~19:00',
        '(일) 21:00~21:30',
        '(일) 23:00~23:30',
        '월요일 아침'
      ],
      returnOptionsForClub: [
        '(토) 17:30~19:00',
        '(토) 21:00~21:30',
        '(토) 23:00~23:30',
        '(일) 17:30~19:00',
        '(일) 21:00~21:30',
        '(일) 23:00~23:30',
        '월요일 아침'
      ],
      stayDays: ['(토)', '(일)']
    };

    function getTodayKstYmd() {
      return new Intl.DateTimeFormat('sv-SE', {
        timeZone: 'Asia/Seoul',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(new Date());
    }

    function inDateRange(today, from, until) {
      if (!from || !until) return false;
      return today >= from && today <= until;
    }

    function isSpecialPlanConfigured() {
      return !!SPECIAL_PLAN.enabled && SPECIAL_PLAN.mode && SPECIAL_PLAN.mode !== 'none';
    }

    function isSpecialSubmitWindow() {
      if (!isSpecialPlanConfigured()) return false;
      return inDateRange(getTodayKstYmd(), SPECIAL_PLAN.submitFrom, SPECIAL_PLAN.submitUntil);
    }

    function isSpecialOperateWindow() {
      if (!isSpecialPlanConfigured()) return false;
      return inDateRange(getTodayKstYmd(), SPECIAL_PLAN.operateFrom, SPECIAL_PLAN.operateUntil);
    }

    function isSpecialPlanActive() {
      if (!isSpecialPlanConfigured()) return false;
      return isSpecialSubmitWindow() || isSpecialOperateWindow();
    }

    function getPlanMode() {
      return isSpecialPlanActive() ? SPECIAL_PLAN.mode : 'none';
    }

    function isOneDayMode() {
      return getPlanMode() === 'oneDay';
    }

    function isTwoDayMode() {
      return getPlanMode() === 'twoDay';
    }

    function getActiveStayDays() {
      if (isSpecialPlanActive() && SPECIAL_PLAN.stayDays && SPECIAL_PLAN.stayDays.length > 0) {
        return SPECIAL_PLAN.stayDays;
      }
      return DEFAULT_WEEKEND.stayDays;
    }

    function getActiveClubLeaveOptions() {
      if (isSpecialPlanActive() && SPECIAL_PLAN.clubLeaveOptions && SPECIAL_PLAN.clubLeaveOptions.length > 0) {
        return SPECIAL_PLAN.clubLeaveOptions.slice(0, 4);
      }
      return DEFAULT_WEEKEND.clubLeaveOptions;
    }

    function getAllowedTriangleLeaveOptions() {
      if (isTwoDayMode()) {
        return SPECIAL_PLAN.triangleLeaveOptions || [];
      }
      return DEFAULT_WEEKEND.triangleLeaveOptions;
    }

    function getAllowedReturnOptions(choice) {
      if (isSpecialPlanActive() && (choice === '' || choice === '♣' || choice === '△')) {
        return SPECIAL_PLAN.returnOptions || [];
      }
      if (choice === '♣') return DEFAULT_WEEKEND.returnOptionsForClub;
      if (choice === '' || choice === '△') return DEFAULT_WEEKEND.returnOptionsForAllHomeOrTriangle;
      return [];
    }

    function getActiveMealLabels() {
      const days = getActiveStayDays();

      if (isOneDayMode()) {
        const d = days[0] || '(공휴일)';
        return [`${d} 조식`, `${d} 중식`, `${d} 석식`];
      }

      const d1 = days[0] || '(토)';
      const d2 = days[1] || '(일)';
      return [
        `${d1} 조식`, `${d1} 중식`, `${d1} 석식`,
        `${d2} 조식`, `${d2} 중식`, `${d2} 석식`
      ];
    }

    function dayNameFromLabel(label) {
      const s = normalizeOptionText(label);
      if (s === '(월)') return '월요일';
      if (s === '(화)') return '화요일';
      if (s === '(수)') return '수요일';
      if (s === '(목)') return '목요일';
      if (s === '(금)') return '금요일';
      if (s === '(토)') return '토요일';
      if (s === '(일)') return '일요일';
      return s.replace(/[()]/g, '') || '해당일';
    }

    function getFirstStayDayName() {
      return dayNameFromLabel(getActiveStayDays()[0] || '(토)');
    }

    function getSecondStayDayName() {
      return dayNameFromLabel(getActiveStayDays()[1] || '(일)');
    }

    function normalizeOptionText(value) {
      return String(value || '')
        .replace(/[\u200B-\u200D\uFEFF]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function optionIncludes(options, value) {
      const target = normalizeOptionText(value);
      return options.some(opt => normalizeOptionText(opt) === target);
    }

    function isTriangleFirstDayLeave(value) {
      const d = getActiveStayDays()[0] || '(토)';
      return normalizeOptionText(value).startsWith(d);
    }

    function isTriangleSecondDayLeave(value) {
      const d = getActiveStayDays()[1] || '(일)';
      return normalizeOptionText(value).startsWith(d);
    }

    function val(id) {
      return document.getElementById(id).value;
    }

    function setVal(id, value) {
      document.getElementById(id).value = value;
    }

    function toggle(id, show) {
      document.getElementById(id).classList.toggle('hidden', !show);
    }

    function msg(text, ok) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'ok' : 'err');
    }

    function setOptions(selectId, options) {
      const select = document.getElementById(selectId);
      const currentValue = select.value;

      select.innerHTML = '';

      const first = document.createElement('option');
      first.value = '';
      first.textContent = '선택';
      select.appendChild(first);

      options.forEach(value => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        select.appendChild(opt);
      });

      if (optionIncludes(options, currentValue)) {
        select.value = options.find(opt => normalizeOptionText(opt) === normalizeOptionText(currentValue));
      } else {
        select.value = '';
      }
    }

    function setSpecialNotice() {
      const box = document.getElementById('specialNotice');

      if (!isSpecialPlanActive()) {
        box.style.display = 'none';
        box.textContent = '';
        return;
      }

      box.style.display = 'block';

      if (isOneDayMode()) {
        box.textContent =
          `1일형 특별기간입니다. 신청기간은 ${SPECIAL_PLAN.submitFrom}~${SPECIAL_PLAN.submitUntil}이며, 공통선택은 잔류, 공휴일 귀가, 통학만 사용할 수 있습니다. 식사와 외출은 ${getFirstStayDayName()} 기준으로 운영됩니다.`;
      } else if (isTwoDayMode()) {
        box.textContent =
          `2일형 특별기간입니다. 신청기간은 ${SPECIAL_PLAN.submitFrom}~${SPECIAL_PLAN.submitUntil}이며, 식사와 외출은 ${getFirstStayDayName()} / ${getSecondStayDayName()} 기준으로 운영됩니다.`;
      }
    }

    function updateCommonChoiceLabels() {
      const club = document.getElementById('clubOption');
      const triangle = document.getElementById('triangleOption');
      const help = document.getElementById('choiceHelp');

      const select = document.getElementById('commonChoice');

      Array.from(select.options).forEach(opt => {
        opt.disabled = false;
      });

      if (isOneDayMode()) {
        club.textContent = '♣ (공휴일 귀가)';
        triangle.textContent = '△ (사용 안 함)';
        triangle.disabled = true;

        Array.from(select.options).forEach(opt => {
          if (opt.value === '') opt.disabled = true;
          if (opt.value === '△') opt.disabled = true;
        });

        help.textContent = '1일형 특별기간에는 O(잔류), ♣(공휴일 귀가), 통학만 선택합니다.';
      } else {
        club.textContent = '♣ (금요일 귀가)';
        triangle.disabled = false;

        if (isTwoDayMode()) {
          triangle.textContent = '△ (특별기간 중 귀가)';
          help.textContent = '2일형 특별기간에는 △로 1일차/2일차 귀가를 선택할 수 있습니다.';
        } else {
          triangle.textContent = '△ (토요일 귀가)';
          help.textContent = '일반 주말에는 △가 토요일 귀가를 의미합니다.';
        }
      }
    }

    function updateLeaveLabels() {
      document.getElementById('clubLeaveLabel').textContent =
        isOneDayMode() ? '공휴일 귀가시간' : '금요일 귀가시간';

      document.getElementById('triangleLeaveLabel').textContent =
        isTwoDayMode() ? '특별기간 귀가시간' : '토요일 귀가시간';
    }

    function renderMealChecks() {
      const box = document.getElementById('mealChecks');
      box.innerHTML = '';

      getActiveMealLabels().forEach(label => {
        const wrapper = document.createElement('label');
        const input = document.createElement('input');

        input.type = 'checkbox';
        input.value = label;

        wrapper.appendChild(input);
        wrapper.appendChild(document.createTextNode(' ' + label));
        box.appendChild(wrapper);
      });
    }

    function updateOutingLabels() {
      const first = getFirstStayDayName();
      const second = getSecondStayDayName();

      document.getElementById('firstOutingTitle').textContent = `${first} 외출`;
      document.getElementById('firstOutingReasonLabel').textContent = `${first} 외출 사유`;
      document.getElementById('firstOutingDepartLabel').textContent = `${first} 외출 출발`;
      document.getElementById('firstOutingReturnLabel').textContent = `${first} 외출 복귀`;

      document.getElementById('secondOutingTitle').textContent = `${second} 외출`;
      document.getElementById('secondOutingReasonLabel').textContent = `${second} 외출 사유`;
      document.getElementById('secondOutingDepartLabel').textContent = `${second} 외출 출발`;
      document.getElementById('secondOutingReturnLabel').textContent = `${second} 외출 복귀`;
    }

    function clearMealChecks() {
      document.querySelectorAll('#mealChecks input[type="checkbox"]').forEach(el => {
        el.checked = false;
      });
    }

    function selectedMeals() {
      return Array.from(document.querySelectorAll('#mealChecks input[type="checkbox"]:checked'))
        .map(el => el.value);
    }

    function isSecondStayDayMeal(value) {
      const days = getActiveStayDays();
      if (days.length < 2) return false;
      return normalizeOptionText(value).startsWith(days[1]);
    }

    function updateMealAvailability(choice) {
      const checkboxes = document.querySelectorAll('#mealChecks input[type="checkbox"]');
      const triangleLeaveTime = val('saturdayTime');

      checkboxes.forEach(el => {
        let enabled = false;

        if (choice === 'O') {
          enabled = true;
        } else if (!isOneDayMode() && choice === '△') {
          if (isTriangleFirstDayLeave(triangleLeaveTime) && isSecondStayDayMeal(el.value)) {
            enabled = false;
          } else {
            enabled = true;
          }
        }

        el.disabled = !enabled;
        el.parentElement.style.opacity = enabled ? '1' : '0.5';

        if (!enabled) {
          el.checked = false;
        }
      });
    }

    function updateOutingAvailability(choice, returnTime) {
      const triangleLeaveTime = val('saturdayTime');
      const r = normalizeOptionText(returnTime);
      const days = getActiveStayDays();

      const firstDay = days[0] || '(토)';
      const secondDay = days[1] || '(일)';

      let allowFirst = false;
      let allowSecond = false;

      if (isOneDayMode()) {
        allowFirst = choice === 'O';
        allowSecond = false;
      } else {
        const triangleFirst = choice === '△' && isTriangleFirstDayLeave(triangleLeaveTime);
        const triangleSecond = choice === '△' && isTriangleSecondDayLeave(triangleLeaveTime);

        allowFirst =
          choice === 'O' ||
          triangleFirst ||
          triangleSecond ||
          (choice === '♣' && r.startsWith(firstDay));

        allowSecond =
          choice === 'O' ||
          triangleSecond ||
          (choice === '♣' && (r.startsWith(firstDay) || r.startsWith(secondDay))) ||
          (choice === '△' && r.startsWith(secondDay));
      }

      toggle('satOutingWrap', allowFirst);
      toggle('sunOutingWrap', allowSecond);

      if (!allowFirst) {
        setVal('satOutingReason', '');
        setVal('satOutingDepartTime', '');
        setVal('satOutingReturnTime', '');
      }

      if (!allowSecond) {
        setVal('sunOutingReason', '');
        setVal('sunOutingDepartTime', '');
        setVal('sunOutingReturnTime', '');
      }
    }

    function toggleFields() {
      const choice = val('commonChoice');

      setOptions('fridayTime', getActiveClubLeaveOptions());
      setOptions('saturdayTime', getAllowedTriangleLeaveOptions());
      setOptions('returnTime', getAllowedReturnOptions(choice));

      toggle('fridayWrap', choice === '♣');
      toggle('saturdayWrap', !isOneDayMode() && choice === '△');
      toggle('returnWrap', choice === '' || choice === '♣' || choice === '△');
      toggle('mealWrap', choice === 'O' || (!isOneDayMode() && choice === '△'));

      if (choice !== '♣') {
        setVal('fridayTime', '');
      }

      if (choice !== '△') {
        setVal('saturdayTime', '');
      }

      if (choice !== 'O' && choice !== '△') {
        clearMealChecks();
      }

      updateMealAvailability(choice);
      updateOutingAvailability(choice, val('returnTime'));
    }

    function handleTriangleLeaveTimeChange() {
      updateMealAvailability(val('commonChoice'));
      updateOutingAvailability(val('commonChoice'), val('returnTime'));
    }

    function handleReturnTimeChange() {
      updateOutingAvailability(val('commonChoice'), val('returnTime'));
    }

    function validateBeforeSubmit() {
      const choice = val('commonChoice');

      if (!val('className')) throw new Error('반을 선택하세요.');
      if (!val('studentId').trim()) throw new Error('학번을 입력하세요.');
      if (!val('studentName').trim()) throw new Error('이름을 입력하세요.');
      if (choice === '__SELECT__') throw new Error('공통 선택을 선택하세요.');

      if (SPECIAL_PLAN.enforceSubmitWindow && isSpecialPlanConfigured() && !isSpecialSubmitWindow()) {
        throw new Error(`특별기간 신청 가능 기간이 아닙니다. 신청 가능 기간: ${SPECIAL_PLAN.submitFrom} ~ ${SPECIAL_PLAN.submitUntil}`);
      }

      const allowedCommonChoices = isOneDayMode()
        ? ['O', '♣', '통학']
        : ['', 'O', '♣', '△', '통학'];

      if (!allowedCommonChoices.includes(choice)) {
        throw new Error(isOneDayMode()
          ? '1일형 특별기간에는 잔류, 공휴일 귀가, 통학만 선택할 수 있습니다.'
          : '공통 선택 값이 올바르지 않습니다.');
      }

      if (choice === '♣' && !val('fridayTime')) {
        throw new Error(isOneDayMode() ? '공휴일 귀가시간을 선택하세요.' : '금요일 귀가시간을 선택하세요.');
      }

      if (choice === '♣' && !optionIncludes(getActiveClubLeaveOptions(), val('fridayTime'))) {
        throw new Error('허용되지 않은 귀가시간입니다. 다시 선택하세요.');
      }

      if (!isOneDayMode() && choice === '△' && !val('saturdayTime')) {
        throw new Error(isTwoDayMode() ? '특별기간 귀가시간을 선택하세요.' : '토요일 귀가시간을 선택하세요.');
      }

      if (!isOneDayMode() && choice === '△' && !optionIncludes(getAllowedTriangleLeaveOptions(), val('saturdayTime'))) {
        throw new Error('허용되지 않은 귀가시간입니다. 다시 선택하세요.');
      }

      if ((choice === '' || choice === '♣' || choice === '△') && !val('returnTime')) {
        throw new Error('복귀시간을 선택하세요.');
      }

      if ((choice === '' || choice === '♣' || choice === '△') &&
          !optionIncludes(getAllowedReturnOptions(choice), val('returnTime'))) {
        throw new Error('허용되지 않은 복귀시간입니다. 다시 선택하세요.');
      }
    }

    async function submitForm(event) {
      event.preventDefault();

      try {
        validateBeforeSubmit();

        const data = new URLSearchParams();

        data.append('className', val('className'));
        data.append('studentId', val('studentId').trim());
        data.append('studentName', val('studentName').trim());
        data.append('commonChoice', val('commonChoice'));
        data.append('fridayTime', val('fridayTime'));
        data.append('saturdayTime', val('saturdayTime'));
        data.append('returnTime', val('returnTime'));
        data.append('meals', selectedMeals().join('|'));

        data.append('satOutingReason', val('satOutingReason'));
        data.append('satOutingDepartTime', val('satOutingDepartTime'));
        data.append('satOutingReturnTime', val('satOutingReturnTime'));

        data.append('sunOutingReason', val('sunOutingReason'));
        data.append('sunOutingDepartTime', val('sunOutingDepartTime'));
        data.append('sunOutingReturnTime', val('sunOutingReturnTime'));

        msg('제출 중입니다...', true);

        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: data
        });

        const json = await res.json();

        if (!json.ok) {
          throw new Error(json.error || '제출에 실패했습니다.');
        }

        msg(json.message || '제출되었습니다.', true);
      } catch (err) {
        msg('오류: ' + (err.message || err), false);
      }
    }

    function resetForm() {
      document.getElementById('form').reset();
      msg('', true);
      initializePage();
    }

    function initializePage() {
      updateCommonChoiceLabels();
      updateLeaveLabels();
      setSpecialNotice();
      renderMealChecks();
      updateOutingLabels();
      toggleFields();
    }

    document.getElementById('form').addEventListener('submit', submitForm);

    initializePage();
  </script>
</body>
</html>
