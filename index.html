<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>주말 외출·외박 신청</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
      color: #202124;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 2px 10px rgba(60, 64, 67, 0.08);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 6px;
    }

    .desc {
      color: #5f6368;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .notice {
      background: #fef7e0;
      border: 1px solid #fdd663;
      border-radius: 10px;
      padding: 12px;
      margin: 12px 0 18px;
      line-height: 1.5;
      display: none;
    }

    .field {
      margin: 14px 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 7px;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 10px;
      font-size: 16px;
      background: #fff;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .checks label {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0;
      padding: 8px;
      border: 1px solid #eee;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #1a73e8;
      color: #fff;
    }

    .secondary {
      background: #e8eaed;
      color: #202124;
    }

    .msg {
      margin-top: 14px;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .ok {
      color: #188038;
    }

    .err {
      color: #d93025;
    }

    .small {
      font-size: 13px;
      color: #5f6368;
      line-height: 1.45;
      margin-top: 4px;
    }

    @media (max-width: 640px) {
      .grid,
      .checks {
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>주말 외출·외박 신청</h1>

    <div class="desc">
      반, 학번, 이름을 정확히 입력한 뒤 주말 잔류·귀가·외출·식사 신청 내용을 제출하세요.
    </div>

    <div id="specialNotice" class="notice"></div>

    <form id="form">
      <div class="grid">
        <div class="field">
          <label for="className">반</label>
          <select id="className" required>
            <option value="">선택</option>
            <option value="1-1">1-1</option>
            <option value="1-2">1-2</option>
            <option value="1-3">1-3</option>
            <option value="1-4">1-4</option>
            <option value="1-5">1-5</option>
          </select>
        </div>

        <div class="field">
          <label for="studentId">학번</label>
          <input id="studentId" type="text" inputmode="numeric" placeholder="예: 1203" required />
        </div>
      </div>

      <div class="field">
        <label for="studentName">이름</label>
        <input id="studentName" type="text" placeholder="이름" required />
      </div>

      <div class="field">
        <label for="commonChoice">공통 선택</label>
        <select id="commonChoice" onchange="toggleFields()" required>
          <option value="__SELECT__">선택</option>
          <option value="">전체귀가</option>
          <option value="O">O (잔류)</option>
          <option value="♣">♣ (금요일 귀가)</option>
          <option value="△" id="triangleOption">△ (토요일 귀가)</option>
          <option value="통학">통학</option>
        </select>
        <div class="small">
          특별 주간에는 △ 선택 시 토요일 귀가와 일요일 귀가를 함께 선택할 수 있습니다.
        </div>
      </div>

      <div id="fridayWrap" class="field hidden">
        <label for="fridayTime">금요일 귀가시간</label>
        <select id="fridayTime">
          <option value="">선택</option>
          <option value="16:40">16:40</option>
          <option value="18:20">18:20</option>
          <option value="21:00">21:00</option>
          <option value="23:20">23:20</option>
        </select>
      </div>

      <div id="saturdayWrap" class="field hidden">
        <label for="saturdayTime" id="triangleLeaveLabel">토요일 귀가시간</label>
        <select id="saturdayTime" onchange="handleTriangleLeaveTimeChange()">
          <option value="">선택</option>
        </select>
      </div>

      <div id="returnWrap" class="field hidden">
        <label for="returnTime">복귀시간</label>
        <select id="returnTime" onchange="handleReturnTimeChange()">
          <option value="">선택</option>
        </select>
      </div>

      <div id="mealWrap" class="field hidden">
        <label>식사 신청</label>
        <div id="mealChecks" class="checks">
          <label><input type="checkbox" value="(토) 조식" /> (토) 조식</label>
          <label><input type="checkbox" value="(토) 중식" /> (토) 중식</label>
          <label><input type="checkbox" value="(토) 석식" /> (토) 석식</label>
          <label><input type="checkbox" value="(일) 조식" /> (일) 조식</label>
          <label><input type="checkbox" value="(일) 중식" /> (일) 중식</label>
          <label><input type="checkbox" value="(일) 석식" /> (일) 석식</label>
        </div>
        <div class="small">
          토요일 귀가자는 일요일 식사를 신청할 수 없습니다. 특별 주간의 일요일 귀가자는 일요일 식사 신청이 가능합니다.
        </div>
      </div>

      <div id="satOutingWrap" class="field hidden">
        <label>토요일 외출</label>
        <div class="grid">
          <div>
            <label for="satOutingReason">토요일 외출 사유</label>
            <input id="satOutingReason" type="text" placeholder="예: 병원, 학원, 가족식사 등" />
          </div>

          <div>
            <label for="satOutingDepartTime">토요일 외출 출발</label>
            <input id="satOutingDepartTime" type="text" placeholder="예: 13:00" />
          </div>
        </div>

        <div class="field">
          <label for="satOutingReturnTime">토요일 외출 복귀</label>
          <input id="satOutingReturnTime" type="text" placeholder="예: 17:30" />
        </div>
      </div>

      <div id="sunOutingWrap" class="field hidden">
        <label>일요일 외출</label>
        <div class="grid">
          <div>
            <label for="sunOutingReason">일요일 외출 사유</label>
            <input id="sunOutingReason" type="text" placeholder="예: 병원, 학원, 가족식사 등" />
          </div>

          <div>
            <label for="sunOutingDepartTime">일요일 외출 출발</label>
            <input id="sunOutingDepartTime" type="text" placeholder="예: 13:00" />
          </div>
        </div>

        <div class="field">
          <label for="sunOutingReturnTime">일요일 외출 복귀</label>
          <input id="sunOutingReturnTime" type="text" placeholder="예: 17:30" />
        </div>
      </div>

      <div class="buttons">
        <button class="primary" type="submit">제출</button>
        <button class="secondary" type="button" onclick="resetForm()">초기화</button>
      </div>

      <div id="message" class="msg"></div>
    </form>
  </div>

  <script>
    /*
      반드시 기존 Apps Script 웹앱 URL로 교체하세요.
      Apps Script를 새 배포가 아니라 기존 배포 업데이트로 처리하면 기존 URL을 그대로 사용하면 됩니다.
    */
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_kKxRHI-HuR7M_4hxDCxYCkyR7WDXk8gr30fSt1EsKD76nCf86Lwk4G6OjKveTGmFMg/exec';

    /*
      code.gs와 반드시 동일하게 맞추세요.
      이 기간 안에서만 △가 토요일/일요일 귀가로 확장되고,
      복귀시간도 특별 복귀시간으로 제한됩니다.
    */
    const SPECIAL_PLAN_ENABLED = true;
    const SPECIAL_PLAN_ACTIVE_FROM = '2026-05-19';
    const SPECIAL_PLAN_ACTIVE_UNTIL = '2026-05-22';

    const TRIANGLE_LEAVE_OPTIONS_DEFAULT = [
      '(토) 9:00 이전',
      '(토) 12:50-2교시 후',
      '(토) 17:30-4교시 후',
      '(토) 21:00',
      '(토) 23:00'
    ];

    const TRIANGLE_LEAVE_OPTIONS_SPECIAL = [
      '(토) 9:00 이전',
      '(토) 12:50-2교시 후',
      '(토) 17:30-4교시 후',
      '(토) 21:00',
      '(토) 23:00',
      '(일) 9:00 이전',
      '(일) 12:50-2교시 후',
      '(일) 17:30-4교시 후',
      '(일) 21:00',
      '(일) 23:00'
    ];

    const RETURN_OPTIONS_FRIDAY = [
      '(토) 17:30~19:00',
      '(토) 21:00~21:30',
      '(토) 23:00~23:30',
      '(일) 17:30~19:00',
      '(일) 21:00~21:30',
      '(일) 23:00~23:30',
      '월요일 아침'
    ];

    const RETURN_OPTIONS_SATURDAY_OR_ALLHOME = [
      '(일) 17:30~19:00',
      '(일) 21:00~21:30',
      '(일) 23:00~23:30',
      '월요일 아침'
    ];

    const SPECIAL_RETURN_OPTIONS = [
      '(화) 15:00~19:00',
      '(화) 21:00~21:30',
      '(화) 23:00~23:30',
      '수요일 오전'
    ];

    function getTodayKstYmd() {
      return new Intl.DateTimeFormat('sv-SE', {
        timeZone: 'Asia/Seoul',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(new Date());
    }

    function isSpecialPlanClient() {
      if (!SPECIAL_PLAN_ENABLED) return false;

      const today = getTodayKstYmd();
      return today >= SPECIAL_PLAN_ACTIVE_FROM && today <= SPECIAL_PLAN_ACTIVE_UNTIL;
    }

    function normalizeOptionText(value) {
      return String(value || '')
        .replace(/[\u200B-\u200D\uFEFF]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function optionIncludes(options, value) {
      const target = normalizeOptionText(value);
      return options.some(opt => normalizeOptionText(opt) === target);
    }

    function val(id) {
      return document.getElementById(id).value;
    }

    function setVal(id, value) {
      document.getElementById(id).value = value;
    }

    function toggle(id, show) {
      document.getElementById(id).classList.toggle('hidden', !show);
    }

    function msg(text, ok) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'ok' : 'err');
    }

    function getAllowedTriangleLeaveOptions() {
      return isSpecialPlanClient()
        ? TRIANGLE_LEAVE_OPTIONS_SPECIAL
        : TRIANGLE_LEAVE_OPTIONS_DEFAULT;
    }

    function getAllowedReturnOptions(choice) {
      if (isSpecialPlanClient() && (choice === '' || choice === '♣' || choice === '△')) {
        return SPECIAL_RETURN_OPTIONS;
      }

      if (choice === '') return RETURN_OPTIONS_SATURDAY_OR_ALLHOME;
      if (choice === '♣') return RETURN_OPTIONS_FRIDAY;
      if (choice === '△') return RETURN_OPTIONS_SATURDAY_OR_ALLHOME;

      return [];
    }

    function setSpecialNotice() {
      const box = document.getElementById('specialNotice');

      if (isSpecialPlanClient()) {
        box.style.display = 'block';
        box.textContent =
          '특별 주간 신청 기간입니다. △ 선택 시 토요일/일요일 귀가를 선택할 수 있으며, 복귀시간은 화요일 15:00~19:00, 화요일 21:00~21:30, 화요일 23:00~23:30, 수요일 오전 중 하나만 선택할 수 있습니다.';
      } else {
        box.style.display = 'none';
        box.textContent = '';
      }
    }

    function setTriangleLeaveOptions() {
      const select = document.getElementById('saturdayTime');
      const currentValue = select.value;
      const options = getAllowedTriangleLeaveOptions();

      select.innerHTML = '';

      const first = document.createElement('option');
      first.value = '';
      first.textContent = '선택';
      select.appendChild(first);

      options.forEach(value => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        select.appendChild(opt);
      });

      if (optionIncludes(options, currentValue)) {
        select.value = options.find(opt => normalizeOptionText(opt) === normalizeOptionText(currentValue));
      } else {
        select.value = '';
      }

      const label = document.getElementById('triangleLeaveLabel');
      if (label) {
        label.textContent = isSpecialPlanClient()
          ? '토요일/일요일 귀가시간'
          : '토요일 귀가시간';
      }

      const option = document.getElementById('triangleOption');
      if (option) {
        option.textContent = isSpecialPlanClient()
          ? '△ (토요일/일요일 귀가)'
          : '△ (토요일 귀가)';
      }
    }

    function setReturnOptions(choice) {
      const select = document.getElementById('returnTime');
      const currentValue = select.value;
      const options = getAllowedReturnOptions(choice);

      select.innerHTML = '';

      const first = document.createElement('option');
      first.value = '';
      first.textContent = '선택';
      select.appendChild(first);

      options.forEach(value => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        select.appendChild(opt);
      });

      if (optionIncludes(options, currentValue)) {
        select.value = options.find(opt => normalizeOptionText(opt) === normalizeOptionText(currentValue));
      } else {
        select.value = '';
      }
    }

    function isTriangleSaturdayLeave(value) {
      return normalizeOptionText(value).startsWith('(토)');
    }

    function isTriangleSundayLeave(value) {
      return normalizeOptionText(value).startsWith('(일)');
    }

    function clearMealChecks() {
      document.querySelectorAll('#mealChecks input[type="checkbox"]').forEach(el => {
        el.checked = false;
      });
    }

    function selectedMeals() {
      return Array.from(document.querySelectorAll('#mealChecks input[type="checkbox"]:checked'))
        .map(el => el.value);
    }

    function updateMealAvailability(choice) {
      const checkboxes = document.querySelectorAll('#mealChecks input[type="checkbox"]');
      const triangleLeaveTime = val('saturdayTime');

      checkboxes.forEach(el => {
        const isSundayMeal = normalizeOptionText(el.value).startsWith('(일)');
        let enabled = false;

        if (choice === 'O') {
          enabled = true;
        } else if (choice === '△') {
          if (isTriangleSaturdayLeave(triangleLeaveTime) && isSundayMeal) {
            enabled = false;
          } else {
            enabled = true;
          }
        }

        el.disabled = !enabled;
        el.parentElement.style.opacity = enabled ? '1' : '0.5';

        if (!enabled) {
          el.checked = false;
        }
      });
    }

    function updateOutingAvailability(choice, returnTime) {
      const triangleLeaveTime = val('saturdayTime');
      const r = normalizeOptionText(returnTime);

      const triangleSaturday = choice === '△' && isTriangleSaturdayLeave(triangleLeaveTime);
      const triangleSunday = choice === '△' && isTriangleSundayLeave(triangleLeaveTime);

      const allowSat =
        choice === 'O' ||
        triangleSaturday ||
        triangleSunday ||
        (choice === '♣' && r.startsWith('(토)'));

      const allowSun =
        choice === 'O' ||
        triangleSunday ||
        (choice === '♣' && (r.startsWith('(토)') || r.startsWith('(일)'))) ||
        (choice === '△' && r.startsWith('(일)'));

      toggle('satOutingWrap', allowSat);
      toggle('sunOutingWrap', allowSun);

      if (!allowSat) {
        setVal('satOutingReason', '');
        setVal('satOutingDepartTime', '');
        setVal('satOutingReturnTime', '');
      }

      if (!allowSun) {
        setVal('sunOutingReason', '');
        setVal('sunOutingDepartTime', '');
        setVal('sunOutingReturnTime', '');
      }
    }

    function toggleFields() {
      const choice = val('commonChoice');

      toggle('fridayWrap', choice === '♣');
      toggle('saturdayWrap', choice === '△');
      toggle('returnWrap', choice === '' || choice === '♣' || choice === '△');
      toggle('mealWrap', choice === 'O' || choice === '△');

      if (choice !== '♣') {
        setVal('fridayTime', '');
      }

      if (choice === '△') {
        setTriangleLeaveOptions();
      } else {
        setVal('saturdayTime', '');
      }

      setReturnOptions(choice);

      if (choice !== 'O' && choice !== '△') {
        clearMealChecks();
      }

      updateMealAvailability(choice);
      updateOutingAvailability(choice, val('returnTime'));
    }

    function handleTriangleLeaveTimeChange() {
      updateMealAvailability(val('commonChoice'));
      updateOutingAvailability(val('commonChoice'), val('returnTime'));
    }

    function handleReturnTimeChange() {
      updateOutingAvailability(val('commonChoice'), val('returnTime'));
    }

    function validateBeforeSubmit() {
      const choice = val('commonChoice');

      if (!val('className')) throw new Error('반을 선택하세요.');
      if (!val('studentId').trim()) throw new Error('학번을 입력하세요.');
      if (!val('studentName').trim()) throw new Error('이름을 입력하세요.');
      if (choice === '__SELECT__') throw new Error('공통 선택을 선택하세요.');

      if (choice === '♣' && !val('fridayTime')) {
        throw new Error('금요일 귀가시간을 선택하세요.');
      }

      if (choice === '△' && !val('saturdayTime')) {
        throw new Error(isSpecialPlanClient()
          ? '토요일/일요일 귀가시간을 선택하세요.'
          : '토요일 귀가시간을 선택하세요.');
      }

      if ((choice === '' || choice === '♣' || choice === '△') && !val('returnTime')) {
        throw new Error('복귀시간을 선택하세요.');
      }

      if (choice === '△') {
        const options = getAllowedTriangleLeaveOptions();
        if (!optionIncludes(options, val('saturdayTime'))) {
          throw new Error('허용되지 않은 귀가시간입니다. 다시 선택하세요.');
        }
      }

      if (choice === '' || choice === '♣' || choice === '△') {
        const options = getAllowedReturnOptions(choice);
        if (!optionIncludes(options, val('returnTime'))) {
          throw new Error('허용되지 않은 복귀시간입니다. 다시 선택하세요.');
        }
      }
    }

    async function submitForm(event) {
      event.preventDefault();

      try {
        validateBeforeSubmit();

        const data = new URLSearchParams();

        data.append('className', val('className'));
        data.append('studentId', val('studentId').trim());
        data.append('studentName', val('studentName').trim());
        data.append('commonChoice', val('commonChoice'));
        data.append('fridayTime', val('fridayTime'));
        data.append('saturdayTime', val('saturdayTime'));
        data.append('returnTime', val('returnTime'));
        data.append('meals', selectedMeals().join('|'));

        data.append('satOutingReason', val('satOutingReason'));
        data.append('satOutingDepartTime', val('satOutingDepartTime'));
        data.append('satOutingReturnTime', val('satOutingReturnTime'));

        data.append('sunOutingReason', val('sunOutingReason'));
        data.append('sunOutingDepartTime', val('sunOutingDepartTime'));
        data.append('sunOutingReturnTime', val('sunOutingReturnTime'));

        msg('제출 중입니다...', true);

        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: data
        });

        const json = await res.json();

        if (!json.ok) {
          throw new Error(json.error || '제출에 실패했습니다.');
        }

        msg(json.message || '제출되었습니다.', true);
      } catch (err) {
        msg('오류: ' + (err.message || err), false);
      }
    }

    function resetForm() {
      document.getElementById('form').reset();
      msg('', true);
      toggleFields();
    }

    document.getElementById('form').addEventListener('submit', submitForm);

    setSpecialNotice();
    setTriangleLeaveOptions();
    toggleFields();
  </script>
</body>
</html>
